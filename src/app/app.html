<mat-sidenav-container class="example-container" hasBackdrop style="z-index: 999">
  <mat-sidenav
    #drawer
    mode="over"
    position="end"
    [fixedInViewport]="true"
    fixedBottomGap="0"
    fixedTopGap="0"
  >
    <app-cart [drawer]="drawer" />
  </mat-sidenav>
  <div class="app-shell">
    <header>
      <mat-toolbar class="toolbar">
        <div class="toolbar-container">
          <div class="toolbar-left">
            <a class="toolbar-link" routerLink="/">
              <span class="toolbar-link-title-decorator"> Æ </span>
              <span class="toolbar-link-title">{{ title() }}</span>
            </a>

            <nav>
              <a routerLink="/collections">Collections</a>
            </nav>
          </div>

          <mat-form-field appearance="outline" class="formfield">
            <input type="text" matInput placeholder="chercher un produit" />
            <mat-icon matPrefix class="icon-size-search">search</mat-icon>
          </mat-form-field>

          <div class="toolbar-right">
            <button matIconButton>
              <mat-icon>favorite_outlined</mat-icon>
            </button>
            <button matIconButton>
              <mat-icon>person_outlined</mat-icon>
            </button>
            <button
              matIconButton
              [matBadge]="numberCarts()"
              [matBadgeHidden]="numberCarts() === 0"
              (click)="drawer.toggle()"
            >
              <mat-icon>shopping_bag_outlined</mat-icon>
            </button>
          </div>
        </div>
      </mat-toolbar>
    </header>

    <main>
      <router-outlet />
    </main>
  </div>
</mat-sidenav-container>
